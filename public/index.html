<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator-Editor AI Workflow</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">MVP Phase 1</p>
        <h1>Creator-Editor Workflow Console</h1>
        <p>Build path: project setup -> video uploads (raw/v1/v2) -> in-browser playback.</p>
      </header>

      <section class="panel">
        <h2>Create Project</h2>
        <form id="project-form" class="stack">
          <label>
            Project Title
            <input type="text" name="title" required placeholder="Riya Reel - AI Jobs Clip" />
          </label>
          <label>
            Creator Name
            <input type="text" name="creatorName" required placeholder="Riya" />
          </label>
          <label>
            Editor Name
            <input type="text" name="editorName" required placeholder="Arjun" />
          </label>
          <button type="submit">Create Project</button>
        </form>
      </section>

      <section class="panel">
        <h2>Upload Video Version</h2>
        <form id="upload-form" class="stack">
          <label>
            Project
            <select name="projectId" id="project-select" required></select>
          </label>
          <label>
            Version
            <select name="versionLabel" required>
              <option value="raw">raw</option>
              <option value="v1">v1</option>
              <option value="v2">v2</option>
            </select>
          </label>
          <label>
            Video File
            <input type="file" name="file" accept="video/*" required />
          </label>
          <button type="submit">Upload</button>
        </form>
      </section>

      <section class="panel">
        <h2>Projects</h2>
        <div id="projects" class="cards"></div>
      </section>

      <section class="panel">
        <h2>Preview</h2>
        <p id="preview-meta">Select a project asset to preview.</p>
        <video id="preview-video" controls playsinline></video>
      </section>

      <section class="panel">
        <h2>AI Placeholder Actions</h2>
        <div class="stack">
          <button id="generate-brief" type="button">Generate Structured Brief (Mock)</button>
          <button id="generate-checklist" type="button">Generate Revision Checklist (Mock)</button>
          <pre id="ai-output" class="output"></pre>
        </div>
      </section>
    </main>

    <script type="module" src="/public/app.js"></script>
  </body>
</html>
